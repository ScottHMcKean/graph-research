bundle:
  name: graph-hierarchy-mapping

variables:
  catalog:
    default: shm
  schema:
    default: graph

resources:
  apps:
    review_app:
      name: "graph-mapping-review-${bundle.target}"
      description: "Review agent-proposed taxonomy mappings"
      source_code_path: ./app

  jobs:
    data_setup:
      name: "[Graph Mapping] 01 - Data Setup"
      tasks:
        - task_key: setup
          notebook_task:
            notebook_path: notebooks/01_data_setup.py
            warehouse_id: ""

    mapping_agent:
      name: "[Graph Mapping] 02 - Mapping Agent"
      tasks:
        - task_key: agent
          notebook_task:
            notebook_path: notebooks/02_mapping_agent.py
            warehouse_id: ""

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: "~/.bundle/${bundle.name}/${bundle.target}"
